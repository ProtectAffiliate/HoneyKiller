<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Subtle top-shine overlay -->
  <rect width="128" height="64"  rx="26" fill="url(#shine)"/>

  <!-- Honeycomb hex outline (the thing being killed) -->
  <polygon
    points="64,20 88,34 88,62 64,76 40,62 40,34"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Slash — the "kill" stroke -->
  <line
    x1="38" y1="38" x2="90" y2="90"
    stroke="white"
    stroke-width="9"
    stroke-linecap="round"
    opacity="0.95"
  />

  <!-- HK wordmark -->
  <text
    x="64" y="116"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="28"
    font-weight="900"
    text-anchor="middle"
    fill="white"
    opacity="0.9"
    letter-spacing="1"
  >HK</text>
</svg>
